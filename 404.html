<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Bill's Cleaning Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-center">
    <div class="max-w-md">
        <div class="bg-orange-500/20 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 border border-orange-500/30">
            <i class="fas fa-broom text-4xl text-orange-500"></i>
        </div>
        <h1 class="text-6xl font-black mb-4">404</h1>
        <h2 class="text-2xl font-bold mb-6">Looks like this spot was missed.</h2>
        <p class="text-gray-400 mb-10 leading-relaxed">The page you're looking for doesn't exist or has moved. Let's get you back to a cleaner path.</p>
        <a href="/" class="inline-block bg-orange-500 text-white px-8 py-4 rounded-2xl font-bold hover:bg-orange-600 transition-all shadow-lg shadow-orange-500/20">
            Back to Home
        </a>
    </div>
</body>
</html>
